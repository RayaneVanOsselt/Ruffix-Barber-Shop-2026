<?xml version="1.0" encoding="UTF-8"?>
<!--
  LOGO PLACEHOLDER — Rufix Barber
  Remplacez ce fichier par le vrai logo du salon (SVG de préférence, sinon logo.png).
  Le logo utilise « currentColor » : sa couleur suit la couleur du texte / de l'accent
  définie en CSS. Vous pouvez donc le laisser tel quel jusqu'à réception du logo final.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" role="img" aria-label="Rufix Barber">
  <!-- Monogramme dans un cercle fin -->
  <g fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="28" cy="28" r="22"/>
  </g>
  <text x="28" y="36" text-anchor="middle" font-family="'Playfair Display', Georgia, serif"
        font-size="26" font-weight="700" fill="currentColor">R</text>
  <!-- Petit trait rasoir décoratif -->
  <line x1="18" y1="43" x2="38" y2="43" stroke="currentColor" stroke-width="1.4" opacity="0.6"/>
  <!-- Nom du salon -->
  <text x="64" y="27" font-family="'Playfair Display', Georgia, serif" font-size="22"
        font-weight="700" letter-spacing="1" fill="currentColor">RUFIX</text>
  <text x="64" y="44" font-family="'Montserrat', Arial, sans-serif" font-size="10"
        letter-spacing="5" fill="currentColor" opacity="0.75">BARBER</text>
</svg>
